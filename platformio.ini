[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- Beast Mode Performance Flags ---
build_flags = 
    -DARDUINO_ARCH_ESP32
    -O3                             ; Maximum optimization for speed
    -DCORE_DEBUG_LEVEL=0            ; Turn off background logs to save CPU
    -I lib/glove_inference/src      ; Ensures PIO finds your AI headers

; --- Library Dependencies ---
lib_deps = 
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    Wire
    adafruit/Adafruit MPU6050 @ ^2.2.9

; --- Source Filter ---
; Ensure ONLY your AI runner file is being compiled
src_filter = +<*> -<main.cpp> -<main_data_read.cpp> +<AI_data_reader.cpp>

; --- Speed Tweaks for ESP32-S3 ---
board_build.f_cpu = 240000000L      ; Set CPU to 240MHz
board_build.f_flash = 80000000L     ; Set Flash to 80MHz
upload_speed = 921600               ; Faster uploads so you don't waste time